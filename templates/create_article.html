<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写新文章 </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.09);
            border-radius: 12px;
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(120deg, #6f42c1, #6610f2);
            color: white;
            border: none;
        }
        .editor-toolbar {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #e9ecef;
        }
        #content {
            min-height: 350px;
            padding: 20px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-family: inherit;
            line-height: 1.7;
            transition: all 0.3s ease;
        }
        #content:focus {
            border-color: #86b7fe;
            outline: 0;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }
        .style-badge {
            background: rgba(13, 110, 253, 0.1);
            color: #0d6efd;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-primary {
            background: linear-gradient(120deg, #6f42c1, #6610f2);
            border: none;
            padding: 10px 25px;
            font-weight: 600;
            border-radius: 8px;
        }
        .btn-primary:hover {
            background: linear-gradient(120deg, #5a32a3, #520dc2);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }
        .btn-secondary {
            border-radius: 8px;
            padding: 10px 25px;
            font-weight: 600;
        }
        .form-control-color {
            width: 3rem;
            height: 2.8rem;
            border: none;
            border-radius: 8px;
        }
        .form-select {
            border-radius: 8px;
            padding: 10px;
        }
        .preview-indicator {
            position: absolute;
            top: 10px;
            right: 15px;
            background: rgba(25, 135, 84, 0.1);
            color: #198754;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .editor-container {
            position: relative;
        }
        .tooltip-icon {
            color: #6c757d;
            cursor: pointer;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card">
                    <div class="card-header py-3">
                        <h5 class="card-title mb-0"><i class="fas fa-pen-fancy me-2"></i>写新文章</h5>
                    </div>
                    <div class="card-body">
                        <form method="POST">
                            <div class="mb-4">
                                <label for="title" class="form-label fw-bold">文章标题</label>
                                <input type="text" class="form-control form-control-lg" id="title" name="title" placeholder="输入标题" required>
                            </div>

                            <div class="mb-4 editor-container">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <label for="content" class="form-label fw-bold">文章内容</label>
                                    <span class="preview-indicator">
                                        <i class="fas fa-eye me-1"></i> 实时样式预览
                                    </span>
                                </div>
                                
                                <div class="editor-toolbar d-flex gap-2 mb-2">
                                    <span class="style-badge">
                                        <i class="fas fa-text-height"></i>
                                        <span id="current-font-size">中</span>
                                    </span>
                                    <span class="style-badge">
                                        <i class="fas fa-palette"></i>
                                        <span id="current-color">#000000</span>
                                    </span>
                                </div>

                                <textarea
                                    class="form-control"
                                    id="content"
                                    name="content"
                                    required
                                ></textarea>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label for="font_size" class="form-label fw-bold">
                                        字体大小
                                        <span class="tooltip-icon" data-bs-toggle="tooltip" title="选择您喜欢的字体大小">
                                            <i class="fas fa-info-circle"></i>
                                        </span>
                                    </label>
                                    <select class="form-select" id="font_size" name="font_size">
                                        <option value="14px">小</option>
                                        <option value="16px" selected>中</option>
                                        <option value="18px">大</option>
                                        <option value="20px">特大</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="font_color" class="form-label fw-bold">
                                        字体颜色
                                        <span class="tooltip-icon" data-bs-toggle="tooltip" title="选择文本颜色">
                                            <i class="fas fa-info-circle"></i>
                                        </span>
                                    </label>
                                    <input type="color" class="form-control form-control-color" id="font_color" name="font_color" value="#000000" title="选择字体颜色">
                                </div>
                            </div>

                            <div class="mb-4">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="is_public" name="is_public">
                                    <label class="form-check-label" for="is_public">公开文章</label>
                                </div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end pt-3">
                                <a href="#" class="btn btn-secondary me-md-2">
                                    <i class="fas fa-times me-1"></i> 取消
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-paper-plane me-1"></i> 发布文章
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                
                <div class="mt-4 text-center text-muted">
                    <p>© 内容创作平台 | 让每一篇文章都精彩</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化工具提示
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
            var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl)
            });

            const contentInput = document.getElementById('content');
            const fontSizeSelect = document.getElementById('font_size');
            const colorInput = document.getElementById('font_color');
            const currentFontSize = document.getElementById('current-font-size');
            const currentColor = document.getElementById('current-color');

            // 更新编辑器样式函数
            function updateEditorStyle() {
                contentInput.style.fontSize = fontSizeSelect.value;
                contentInput.style.color = colorInput.value;

                // 更新显示当前选择的标签
                currentFontSize.textContent = fontSizeSelect.options[fontSizeSelect.selectedIndex].text;
                currentColor.textContent = colorInput.value;
            }

            // 添加事件监听器
            fontSizeSelect.addEventListener('change', updateEditorStyle);
            colorInput.addEventListener('input', updateEditorStyle);

            // 初始化样式
            updateEditorStyle();

            // 添加输入时的动态效果
            contentInput.addEventListener('focus', function() {
                this.style.boxShadow = "0 0 0 0.25rem rgba(13, 110, 253, 0.15)";
                this.style.borderColor = "#86b7fe";
            });

            contentInput.addEventListener('blur', function() {
                this.style.boxShadow = "";
                this.style.borderColor = "#ced4da";
            });
        });
    </script>
</body>
</html>
